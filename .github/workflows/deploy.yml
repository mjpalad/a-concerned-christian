name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Runs at 14:15 UTC every Monday.
    # This equals 9:15 AM Central during DST and 8:15 AM Central during Standard Time.
    - cron: '15 14 * * 1'    
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Fetch RSS Feed
        run: curl -sf "https://api.riverside.fm/hosting/wWERn1AV.rss" > public/podcast-feed.xml

      - name: Fetch Transcripts
        run: node scripts/fetch-transcripts.cjs

      - run: npm run build

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
